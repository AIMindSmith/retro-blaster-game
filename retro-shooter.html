<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETRO BLASTER - Arcade Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 60%, rgba(0, 0, 0, 0.6) 100%);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="vignette"></div>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Disable smoothing for pixel art look
        ctx.imageSmoothingEnabled = false;

        // Game state
        const GameState = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAME_OVER: 'gameOver',
            VICTORY: 'victory'
        };

        let gameState = GameState.MENU;
        let frame = 0;
        let score = 0;
        let level = 1;
        let lives = 3;
        let combo = 0;
        let comboTimer = 0;

        // Input handling
        const keys = {};
        const mouse = { x: canvas.width / 2, y: canvas.height / 2, down: false };

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Escape') {
                if (gameState === GameState.PLAYING) gameState = GameState.PAUSED;
                else if (gameState === GameState.PAUSED) gameState = GameState.PLAYING;
            }
            if (e.key === ' ' && gameState === GameState.MENU) {
                startGame();
            }
            if (e.key === 'r' && (gameState === GameState.GAME_OVER || gameState === GameState.VICTORY)) {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        document.addEventListener('mousedown', () => {
            mouse.down = true;
        });

        document.addEventListener('mouseup', () => {
            mouse.down = false;
        });

        // Utility functions
        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        function angle(x1, y1, x2, y2) {
            return Math.atan2(y2 - y1, x2 - x1);
        }

        function randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        // Sprite generation (procedural pixel art)
        function createPlayerSprite() {
            const sprite = document.createElement('canvas');
            sprite.width = 32;
            sprite.height = 32;
            const sctx = sprite.getContext('2d');

            // Body
            sctx.fillStyle = '#4ade80';
            sctx.fillRect(8, 8, 16, 16);
            sctx.fillStyle = '#22c55e';
            sctx.fillRect(12, 12, 8, 8);

            // Helmet
            sctx.fillStyle = '#60a5fa';
            sctx.fillRect(10, 4, 12, 6);
            sctx.fillStyle = '#3b82f6';
            sctx.fillRect(12, 6, 8, 2);

            return sprite;
        }

        function createEnemySprite(type) {
            const sprite = document.createElement('canvas');
            sprite.width = 32;
            sprite.height = 32;
            const sctx = sprite.getContext('2d');

            const colors = {
                basic: ['#ef4444', '#dc2626'],
                fast: ['#f97316', '#ea580c'],
                tank: ['#7c3aed', '#6d28d9'],
                boss: ['#ec4899', '#db2777']
            };

            const [main, dark] = colors[type] || colors.basic;

            // Body
            sctx.fillStyle = main;
            sctx.fillRect(6, 8, 20, 16);
            sctx.fillStyle = dark;
            sctx.fillRect(10, 12, 12, 8);

            // Eyes
            sctx.fillStyle = '#fff';
            sctx.fillRect(8, 10, 4, 4);
            sctx.fillRect(20, 10, 4, 4);
            sctx.fillStyle = '#000';
            sctx.fillRect(9, 11, 2, 2);
            sctx.fillRect(21, 11, 2, 2);

            return sprite;
        }

        function createGunSprite() {
            const sprite = document.createElement('canvas');
            sprite.width = 24;
            sprite.height = 24;
            const sctx = sprite.getContext('2d');

            // Gun body
            sctx.fillStyle = '#6b7280';
            sctx.fillRect(4, 8, 16, 8);
            sctx.fillStyle = '#4b5563';
            sctx.fillRect(8, 10, 8, 4);

            // Barrel
            sctx.fillStyle = '#9ca3af';
            sctx.fillRect(18, 9, 6, 6);

            // Handle
            sctx.fillStyle = '#374151';
            sctx.fillRect(8, 16, 8, 6);

            return sprite;
        }

        function createBulletSprite() {
            const sprite = document.createElement('canvas');
            sprite.width = 8;
            sprite.height = 8;
            const sctx = sprite.getContext('2d');

            sctx.fillStyle = '#fbbf24';
            sctx.fillRect(2, 2, 4, 4);
            sctx.fillStyle = '#f59e0b';
            sctx.fillRect(3, 3, 2, 2);

            return sprite;
        }

        function createPowerUpSprite(type) {
            const sprite = document.createElement('canvas');
            sprite.width = 20;
            sprite.height = 20;
            const sctx = sprite.getContext('2d');

            const colors = {
                health: '#22c55e',
                speed: '#3b82f6',
                multishot: '#f59e0b',
                shield: '#8b5cf6'
            };

            sctx.fillStyle = colors[type] || '#fff';
            sctx.fillRect(4, 4, 12, 12);
            sctx.fillStyle = '#fff';
            sctx.fillRect(8, 8, 4, 4);

            return sprite;
        }

        // Sprites
        const sprites = {
            player: createPlayerSprite(),
            gun: createGunSprite(),
            bullet: createBulletSprite(),
            enemies: {
                basic: createEnemySprite('basic'),
                fast: createEnemySprite('fast'),
                tank: createEnemySprite('tank'),
                boss: createEnemySprite('boss')
            },
            powerups: {
                health: createPowerUpSprite('health'),
                speed: createPowerUpSprite('speed'),
                multishot: createPowerUpSprite('multishot'),
                shield: createPowerUpSprite('shield')
            }
        };

        // Classes
        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.radius = 16;
                this.speed = 4;
                this.angle = 0;
                this.health = 100;
                this.maxHealth = 100;
                this.shield = false;
                this.shieldTimer = 0;
                this.multishot = false;
                this.multishotTimer = 0;
                this.fireRate = 8;
                this.fireTimer = 0;
                this.invincible = 0;
            }

            update() {
                // Movement with arrow keys
                if (keys['ArrowUp'] || keys['w'] || keys['W']) this.y -= this.speed;
                if (keys['ArrowDown'] || keys['s'] || keys['S']) this.y += this.speed;
                if (keys['ArrowLeft'] || keys['a'] || keys['A']) this.x -= this.speed;
                if (keys['ArrowRight'] || keys['d'] || keys['D']) this.x += this.speed;

                // Keep in bounds
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                // Calculate angle to mouse
                this.angle = angle(this.x, this.y, mouse.x, mouse.y);

                // Timers
                if (this.shieldTimer > 0) {
                    this.shieldTimer--;
                    this.shield = this.shieldTimer > 0;
                }
                if (this.multishotTimer > 0) {
                    this.multishotTimer--;
                    this.multishot = this.multishotTimer > 0;
                }
                if (this.invincible > 0) this.invincible--;
                if (this.fireTimer > 0) this.fireTimer--;

                // Shooting
                if (mouse.down && this.fireTimer <= 0) {
                    this.shoot();
                    this.fireTimer = this.fireRate;
                }
            }

            shoot() {
                const bulletSpeed = 12;

                if (this.multishot) {
                    // Triple shot
                    bullets.push(new Bullet(this.x, this.y, this.angle, bulletSpeed));
                    bullets.push(new Bullet(this.x, this.y, this.angle - 0.3, bulletSpeed));
                    bullets.push(new Bullet(this.x, this.y, this.angle + 0.3, bulletSpeed));
                } else {
                    bullets.push(new Bullet(this.x, this.y, this.angle, bulletSpeed));
                }

                // Muzzle flash effect
                createParticles(this.x + Math.cos(this.angle) * 20, this.y + Math.sin(this.angle) * 20, '#fbbf24', 5);
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Draw gun
                ctx.drawImage(sprites.gun, -12, -12);

                // Draw shield
                if (this.shield) {
                    ctx.strokeStyle = `rgba(139, 92, 246, ${0.5 + Math.sin(frame * 0.2) * 0.3})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 25, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Draw player
                ctx.rotate(-this.angle);
                ctx.drawImage(sprites.player, -16, -16);

                // Invincibility flash
                if (this.invincible > 0 && Math.floor(frame / 4) % 2 === 0) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.fillRect(-16, -16, 32, 32);
                }

                ctx.restore();
            }

            takeDamage(damage) {
                if (this.invincible > 0 || this.shield) return false;

                this.health -= damage;
                this.invincible = 60;
                createParticles(this.x, this.y, '#ef4444', 10);

                if (this.health <= 0) {
                    lives--;
                    this.health = this.maxHealth;
                    if (lives <= 0) {
                        gameState = GameState.GAME_OVER;
                    }
                }
                return true;
            }

            heal(amount) {
                this.health = Math.min(this.maxHealth, this.health + amount);
            }
        }

        class Bullet {
            constructor(x, y, angle, speed) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = 4;
                this.damage = 25;
                this.lifetime = 100;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.lifetime--;
            }

            draw() {
                ctx.drawImage(sprites.bullet, this.x - 4, this.y - 4);
            }

            isOffScreen() {
                return this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height || this.lifetime <= 0;
            }
        }

        class Enemy {
            constructor(type) {
                // Spawn from different edges
                const edge = Math.floor(Math.random() * 4);
                switch(edge) {
                    case 0: // Top
                        this.x = randomRange(0, canvas.width);
                        this.y = -30;
                        break;
                    case 1: // Right
                        this.x = canvas.width + 30;
                        this.y = randomRange(0, canvas.height);
                        break;
                    case 2: // Bottom
                        this.x = randomRange(0, canvas.width);
                        this.y = canvas.height + 30;
                        break;
                    case 3: // Left
                        this.x = -30;
                        this.y = randomRange(0, canvas.height);
                        break;
                }

                this.type = type;
                const stats = {
                    basic: { health: 50, speed: 1.5, damage: 10, score: 100, radius: 16 },
                    fast: { health: 30, speed: 3.5, damage: 8, score: 150, radius: 14 },
                    tank: { health: 150, speed: 0.8, damage: 20, score: 300, radius: 20 },
                    boss: { health: 500, speed: 0.5, damage: 30, score: 1000, radius: 32 }
                };

                const stat = stats[type];
                this.health = stat.health * (1 + level * 0.2);
                this.maxHealth = this.health;
                this.speed = stat.speed;
                this.damage = stat.damage;
                this.score = stat.score;
                this.radius = stat.radius;
                this.angle = 0;
            }

            update() {
                // Move toward player
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                    this.angle = angle(this.x, this.y, player.x, player.y);
                }

                // Bobbing animation
                this.y += Math.sin(frame * 0.1) * 0.5;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Flash when damaged
                if (this.health < this.maxHealth && Math.floor(frame / 4) % 2 === 0) {
                    ctx.filter = 'brightness(1.5)';
                }

                ctx.drawImage(sprites.enemies[this.type], -16, -16);

                // Health bar for tank and boss
                if (this.type === 'tank' || this.type === 'boss') {
                    const barWidth = 40;
                    const healthPercent = this.health / this.maxHealth;
                    ctx.fillStyle = '#374151';
                    ctx.fillRect(-barWidth / 2, -30, barWidth, 6);
                    ctx.fillStyle = healthPercent > 0.5 ? '#22c55e' : '#ef4444';
                    ctx.fillRect(-barWidth / 2, -30, barWidth * healthPercent, 6);
                }

                ctx.restore();
            }

            takeDamage(damage) {
                this.health -= damage;
                return this.health <= 0;
            }
        }

        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.radius = 10;
                this.lifetime = 600;
                this.bobOffset = 0;
            }

            update() {
                this.lifetime--;
                this.bobOffset = Math.sin(frame * 0.1) * 3;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y + this.bobOffset);
                ctx.drawImage(sprites.powerups[this.type], -10, -10);

                // Glow effect
                ctx.shadowColor = '#fff';
                ctx.shadowBlur = 10;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            apply(player) {
                switch(this.type) {
                    case 'health':
                        player.heal(30);
                        createFloatingText(this.x, this.y, '+30 HP', '#22c55e');
                        break;
                    case 'speed':
                        player.speed = Math.min(8, player.speed + 1);
                        createFloatingText(this.x, this.y, 'SPEED UP!', '#3b82f6');
                        break;
                    case 'multishot':
                        player.multishot = true;
                        player.multishotTimer = 300;
                        createFloatingText(this.x, this.y, 'MULTISHOT!', '#f59e0b');
                        break;
                    case 'shield':
                        player.shield = true;
                        player.shieldTimer = 300;
                        createFloatingText(this.x, this.y, 'SHIELD!', '#8b5cf6');
                        break;
                }
            }
        }

        class Particle {
            constructor(x, y, color, speed) {
                this.x = x;
                this.y = y;
                this.vx = randomRange(-speed, speed);
                this.vy = randomRange(-speed, speed);
                this.color = color;
                this.lifetime = randomRange(20, 40);
                this.size = randomRange(2, 5);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95;
                this.vy *= 0.95;
                this.lifetime--;
                this.size *= 0.97;
            }

            draw() {
                ctx.globalAlpha = this.lifetime / 40;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.lifetime = 60;
                this.vy = -1;
            }

            update() {
                this.y += this.vy;
                this.lifetime--;
            }

            draw() {
                ctx.globalAlpha = this.lifetime / 60;
                ctx.fillStyle = this.color;
                ctx.font = '12px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        // Game objects
        let player;
        let bullets = [];
        let enemies = [];
        let powerUps = [];
        let particles = [];
        let floatingTexts = [];

        // Wave management
        let wave = 1;
        let waveTimer = 0;
        let enemiesInWave = 5;
        let enemiesSpawned = 0;
        let spawnTimer = 0;

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, randomRange(2, 6)));
            }
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push(new FloatingText(x, y, text, color));
        }

        function spawnEnemy() {
            const roll = Math.random();
            let type = 'basic';
            if (roll < 0.1 && level >= 5) type = 'boss';
            else if (roll < 0.3 && level >= 3) type = 'tank';
            else if (roll < 0.6 && level >= 2) type = 'fast';

            enemies.push(new Enemy(type));
        }

        function spawnPowerUp(x, y) {
            if (Math.random() < 0.15) {
                const types = ['health', 'speed', 'multishot', 'shield'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerUps.push(new PowerUp(x, y, type));
            }
        }

        function startGame() {
            gameState = GameState.PLAYING;
            resetGameObjects();
        }

        function resetGame() {
            score = 0;
            level = 1;
            lives = 3;
            wave = 1;
            enemiesInWave = 5;
            resetGameObjects();
            gameState = GameState.MENU;
        }

        function resetGameObjects() {
            player = new Player();
            bullets = [];
            enemies = [];
            powerUps = [];
            particles = [];
            floatingTexts = [];
            waveTimer = 0;
            enemiesSpawned = 0;
            spawnTimer = 0;
        }

        function nextLevel() {
            level++;
            wave = 1;
            enemiesInWave = 5 + level * 2;
            enemiesSpawned = 0;
            createFloatingText(canvas.width / 2, canvas.height / 2, `LEVEL ${level}`, '#fbbf24');
        }

        // Drawing functions
        function drawMenu() {
            // Background gradient
            const gradient = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, 400);
            gradient.addColorStop(0, '#1e293b');
            gradient.addColorStop(1, '#0f172a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Title
            ctx.fillStyle = '#fbbf24';
            ctx.font = '40px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('RETRO', canvas.width / 2, 150);
            ctx.fillStyle = '#ef4444';
            ctx.fillText('BLASTER', canvas.width / 2, 200);

            // Subtitle
            ctx.fillStyle = '#94a3b8';
            ctx.font = '16px "Press Start 2P"';
            ctx.fillText('Arrow Keys / WASD to Move', canvas.width / 2, 280);
            ctx.fillText('Mouse to Aim & Shoot', canvas.width / 2, 310);

            // Pulsing start text
            const pulse = Math.sin(frame * 0.1) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(34, 197, 94, ${0.5 + pulse * 0.5})`;
            ctx.font = '20px "Press Start 2P"';
            ctx.fillText('PRESS SPACE TO START', canvas.width / 2, 400);

            // Decorative elements
            drawStars();
        }

        function drawPaused() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fbbf24';
            ctx.font = '30px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#94a3b8';
            ctx.font = '14px "Press Start 2P"';
            ctx.fillText('Press ESC to Resume', canvas.width / 2, canvas.height / 2 + 50);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ef4444';
            ctx.font = '36px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, 200);

            ctx.fillStyle = '#fff';
            ctx.font = '20px "Press Start 2P"';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, 280);
            ctx.fillText(`Level Reached: ${level}`, canvas.width / 2, 320);

            const pulse = Math.sin(frame * 0.1) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(251, 191, 36, ${0.5 + pulse * 0.5})`;
            ctx.font = '16px "Press Start 2P"';
            ctx.fillText('Press R to Restart', canvas.width / 2, 400);
        }

        function drawVictory() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#22c55e';
            ctx.font = '36px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('VICTORY!', canvas.width / 2, 200);

            ctx.fillStyle = '#fbbf24';
            ctx.font = '24px "Press Start 2P"';
            ctx.fillText(`Score: ${score}`, canvas.width / 2, 280);

            const pulse = Math.sin(frame * 0.1) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(251, 191, 36, ${0.5 + pulse * 0.5})`;
            ctx.font = '16px "Press Start 2P"';
            ctx.fillText('Press R to Play Again', canvas.width / 2, 400);
        }

        function drawUI() {
            ctx.fillStyle = '#fff';
            ctx.font = '14px "Press Start 2P"';
            ctx.textAlign = 'left';

            // Score
            ctx.fillText(`SCORE: ${score}`, 20, 30);

            // Level
            ctx.textAlign = 'center';
            ctx.fillText(`LEVEL ${level} - WAVE ${wave}`, canvas.width / 2, 30);

            // Lives
            ctx.textAlign = 'right';
            ctx.fillStyle = '#ef4444';
            ctx.fillText(`LIVES: ${lives}`, canvas.width - 20, 30);

            // Health bar
            ctx.fillStyle = '#374151';
            ctx.fillRect(20, 40, 150, 12);
            ctx.fillStyle = player.health > 50 ? '#22c55e' : '#ef4444';
            ctx.fillRect(20, 40, 150 * (player.health / player.maxHealth), 12);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(20, 40, 150, 12);

            // Active powerups
            let powerupY = 65;
            if (player.multishot) {
                ctx.fillStyle = '#f59e0b';
                ctx.textAlign = 'left';
                ctx.fillText(`MULTI: ${Math.ceil(player.multishotTimer / 60)}`, 20, powerupY);
                powerupY += 20;
            }
            if (player.shield) {
                ctx.fillStyle = '#8b5cf6';
                ctx.textAlign = 'left';
                ctx.fillText(`SHIELD: ${Math.ceil(player.shieldTimer / 60)}`, 20, powerupY);
            }

            // Combo
            if (combo > 1) {
                ctx.fillStyle = `rgba(251, 191, 36, ${comboTimer / 180})`;
                ctx.textAlign = 'center';
                ctx.font = '24px "Press Start 2P"';
                ctx.fillText(`${combo}x COMBO!`, canvas.width / 2, 70);
            }
        }

        function drawStars() {
            for (let i = 0; i < 50; i++) {
                const x = (i * 137.5 + frame * 0.1) % canvas.width;
                const y = (i * 89 + frame * 0.05) % canvas.height;
                const brightness = Math.sin(frame * 0.05 + i) * 0.5 + 0.5;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.5})`;
                ctx.fillRect(x, y, 2, 2);
            }
        }

        function drawBackground() {
            // Grid background
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(59, 130, 246, 0.1)';
            ctx.lineWidth = 1;

            const gridSize = 40;
            const offset = (frame * 0.5) % gridSize;

            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            for (let y = offset; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            drawStars();
        }

        // Main game loop
        function update() {
            frame++;

            if (gameState === GameState.PLAYING) {
                // Update player
                player.update();

                // Update bullets
                bullets = bullets.filter(bullet => {
                    bullet.update();
                    return !bullet.isOffScreen();
                });

                // Update enemies
                enemies = enemies.filter(enemy => {
                    enemy.update();

                    // Check collision with player
                    if (distance(enemy.x, enemy.y, player.x, player.y) < enemy.radius + player.radius) {
                        player.takeDamage(enemy.damage);
                        createParticles(enemy.x, enemy.y, '#ef4444', 15);
                        return false;
                    }

                    return true;
                });

                // Bullet-enemy collisions
                bullets.forEach(bullet => {
                    enemies.forEach(enemy => {
                        if (distance(bullet.x, bullet.y, enemy.x, enemy.y) < enemy.radius + bullet.radius) {
                            bullet.lifetime = 0;
                            if (enemy.takeDamage(bullet.damage)) {
                                // Enemy died
                                score += enemy.score * (1 + combo * 0.1);
                                combo++;
                                comboTimer = 180;
                                createParticles(enemy.x, enemy.y, '#ef4444', 20);
                                createFloatingText(enemy.x, enemy.y, `+${Math.floor(enemy.score)}`, '#fbbf24');
                                spawnPowerUp(enemy.x, enemy.y);
                            }
                        }
                    });
                });

                // Remove dead enemies
                enemies = enemies.filter(enemy => enemy.health > 0);

                // Remove expired bullets
                bullets = bullets.filter(bullet => bullet.lifetime > 0);

                // Update powerups
                powerUps = powerUps.filter(powerUp => {
                    powerUp.update();

                    // Check collision with player
                    if (distance(powerUp.x, powerUp.y, player.x, player.y) < powerUp.radius + player.radius) {
                        powerUp.apply(player);
                        return false;
                    }

                    return powerUp.lifetime > 0;
                });

                // Update particles
                particles = particles.filter(particle => {
                    particle.update();
                    return particle.lifetime > 0;
                });

                // Update floating text
                floatingTexts = floatingTexts.filter(text => {
                    text.update();
                    return text.lifetime > 0;
                });

                // Wave management
                if (enemies.length === 0 && enemiesSpawned >= enemiesInWave) {
                    wave++;
                    enemiesInWave += 3;
                    enemiesSpawned = 0;
                    createFloatingText(canvas.width / 2, canvas.height / 2, `WAVE ${wave}`, '#3b82f6');

                    if (wave > 3) {
                        nextLevel();
                    }
                }

                // Spawn enemies
                if (enemiesSpawned < enemiesInWave) {
                    spawnTimer--;
                    if (spawnTimer <= 0) {
                        spawnEnemy();
                        enemiesSpawned++;
                        spawnTimer = Math.max(30, 120 - level * 10 - wave * 5);
                    }
                }

                // Combo timer
                if (comboTimer > 0) {
                    comboTimer--;
                } else {
                    combo = 0;
                }

                // Victory condition (optional)
                if (level > 10) {
                    gameState = GameState.VICTORY;
                }
            }
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === GameState.MENU) {
                drawMenu();
            } else if (gameState === GameState.PLAYING || gameState === GameState.PAUSED) {
                drawBackground();

                // Draw powerups
                powerUps.forEach(powerUp => powerUp.draw());

                // Draw particles
                particles.forEach(particle => particle.draw());

                // Draw enemies
                enemies.forEach(enemy => enemy.draw());

                // Draw player
                player.draw();

                // Draw bullets
                bullets.forEach(bullet => bullet.draw());

                // Draw floating text
                floatingTexts.forEach(text => text.draw());

                drawUI();

                if (gameState === GameState.PAUSED) {
                    drawPaused();
                }
            } else if (gameState === GameState.GAME_OVER) {
                drawBackground();
                drawGameOver();
            } else if (gameState === GameState.VICTORY) {
                drawBackground();
                drawVictory();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize
        resetGame();
        gameLoop();
    </script>
</body>
</html>
